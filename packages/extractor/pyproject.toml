[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "innquiry-extractor"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "pdfplumber>=0.11.0",
    "pydantic>=2.0.0",
    "supabase>=2.0.0",
    "tenacity>=9.0.0",
    "requests>=2.32.0",
    "tqdm>=4.0.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio"]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
